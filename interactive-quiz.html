<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>蜗牛AI · AI应用分享会 互动问答</title>
<style>
:root{
  --bg-cream:#FFF8F2;--bg-warm:#FFF5EB;--card-white:#FFFFFF;
  --text-primary:#2D2B32;--text-secondary:#6B6678;--text-muted:#9E99AA;
  --accent-pink:#FF8FAB;--accent-mint:#6EE7B7;--accent-sky:#7DD3FC;
  --accent-lavender:#C4B5FD;--accent-peach:#FCA5A5;--accent-yellow:#FDE68A;
  --accent-coral:#FDA4AF;--green:#34D399;--red:#FB7185;
  --radius:24px;--radius-sm:16px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg-cream);color:var(--text-primary)}
.app{display:flex;flex-direction:column;height:100%;width:100%}

.brand-bar{display:flex;align-items:center;justify-content:center;padding:10px 16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.04);z-index:200;flex-shrink:0}
.brand-bar .brand-logo{height:36px;width:auto}

.screen{display:none;flex-direction:column;flex:1;width:100%;overflow-y:auto}
.screen.active{display:flex;align-items:stretch}

.start-screen,.result-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;min-height:100%;width:100%}
.start-card,.result-card{max-width:420px;width:100%;margin:0 auto;background:var(--card-white);border-radius:var(--radius);padding:32px 24px;box-shadow:0 2px 16px rgba(0,0,0,0.06)}

.start-card h1{font-size:22px;margin-bottom:8px;color:var(--text-primary)}
.start-card .subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.6}
.start-card .info-row{display:flex;gap:12px;margin-bottom:20px}
.start-card .info-item{flex:1;background:var(--bg-warm);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--text-secondary)}
.start-card .info-item span{display:block;font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.btn-primary{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;transition:transform 0.15s;background:linear-gradient(135deg,var(--accent-pink),#FF6B8A);color:#fff}
.btn-primary:active{transform:scale(0.97)}

.quiz-screen{display:flex;flex-direction:column;width:100%;min-height:100%}
.progress-bar-wrap{padding:0 16px;margin-top:12px;flex-shrink:0}
.progress-bar{height:6px;background:var(--bg-warm);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-pink),var(--accent-mint));border-radius:3px;transition:width 0.4s}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-top:6px;padding:0 16px}

.question-area{flex:1;display:flex;flex-direction:column;padding:16px 16px 0;overflow-y:auto}
.module-badge{display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:8px}
.badge-m1{background:#FFE4EC;color:#D6336C}
.badge-m2{background:#E6FFE6;color:#2D8B57}
.badge-m3{background:#E6F2FF;color:#2563EB}
.badge-m4{background:#F0E6FF;color:#7C3AED}
.badge-m5{background:#FFEEE6;color:#C2410C}
.question-card{background:var(--card-white);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.contact-chip{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.contact-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.contact-name{font-size:13px;color:var(--text-secondary)}
.question-text{font-size:16px;font-weight:600;line-height:1.6;color:var(--text-primary);margin-bottom:16px}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option-btn{padding:14px 12px;border:2px solid transparent;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;transition:all 0.2s;background:var(--bg-warm);color:var(--text-primary);line-height:1.5;text-align:left}
.option-btn:hover{border-color:var(--accent-pink)}
.option-btn.selected{border-color:var(--accent-pink);background:#FFE4EC}
.option-btn.correct{border-color:var(--green);background:#E6FFE6;color:#2D8B57}
.option-btn.wrong{border-color:var(--red);background:#FFE8E8;color:#D6336C}
.option-btn.disabled{pointer-events:none;opacity:0.7}

.explanation-card{background:linear-gradient(135deg,#FFF5EB,#FFF8F2);border-radius:var(--radius-sm);padding:16px;margin-top:12px;display:none}
.explanation-card.show{display:block}
.explanation-card .label{font-size:12px;font-weight:600;color:var(--accent-pink);margin-bottom:6px}
.explanation-card .content{font-size:14px;color:var(--text-secondary);line-height:1.6}
.explanation-card .knowledge-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;background:var(--accent-lavender);color:#5B21B6;margin-top:8px}

.next-btn-wrap{padding:12px 16px;flex-shrink:0}
.btn-next{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--accent-mint),#34D399);color:#fff;transition:transform 0.15s}
.btn-next:active{transform:scale(0.97)}
.btn-next:disabled{opacity:0.4;pointer-events:none}

.result-card h2{font-size:20px;margin-bottom:8px}
.result-score{font-size:48px;font-weight:800;color:var(--accent-pink);margin:12px 0}
.result-detail{font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.6}
.result-stats{display:flex;gap:12px;margin-bottom:24px}
.result-stat{flex:1;background:var(--bg-warm);border-radius:var(--radius-sm);padding:12px;text-align:center}
.result-stat .num{font-size:20px;font-weight:700}
.result-stat .num.green{color:var(--green)}
.result-stat .num.red{color:var(--red)}
.result-stat .lbl{font-size:12px;color:var(--text-muted)}
.btn-retry{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--accent-pink),#FF6B8A);color:#fff;transition:transform 0.15s}
.btn-retry:active{transform:scale(0.97)}

.snail-bg-1{background:linear-gradient(135deg,#FFF0F5,#FFE4EC)}
.snail-bg-2{background:linear-gradient(135deg,#F0FFF4,#E6FFE6)}
.snail-bg-3{background:linear-gradient(135deg,#F0F8FF,#E6F2FF)}
.snail-bg-4{background:linear-gradient(135deg,#F8F0FF,#F0E6FF)}
.snail-bg-5{background:linear-gradient(135deg,#FFF5F0,#FFEEE6)}
.snail-bg-6{background:linear-gradient(135deg,#FFFCF0,#FFF8E6)}
.snail-bg-7{background:linear-gradient(135deg,#FFF0F0,#FFE8E8)}
.snail-bg-8{background:linear-gradient(135deg,#F0FFF5,#E6FFEE)}
.snail-bg-9{background:linear-gradient(135deg,#F8F0FF,#F3E8FF)}
.snail-bg-10{background:linear-gradient(135deg,#FFF0F5,#FFE8F0)}
.snail-bg-11{background:linear-gradient(135deg,#F0FFFF,#E6FAFA)}
.snail-bg-12{background:linear-gradient(135deg,#FFFDF5,#FFF8EE)}
.snail-bg-13{background:linear-gradient(135deg,#FFF0F3,#FFEAEF)}
.snail-bg-14{background:linear-gradient(135deg,#FFFCF0,#FFF5E6)}
.snail-bg-15{background:linear-gradient(135deg,#F8F0FF,#F5EAFF)}

@media(max-width:480px){
  .brand-bar .brand-logo{height:28px}
  .start-card,.result-card{padding:24px 16px}
  .options-grid{grid-template-columns:1fr}
  .question-card{padding:18px}
}
</style>
</head>

// ========== STATE ==========
let currentQ = 0;
let shuffledQuestions = [];
let score = 0;
let answers = [];
let selectedOption = null;
let answered = false;

// ========== UTILS ==========
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildShuffledQuestion(q) {
  const allOptions = [q.correctText, ...shuffleArray(q.distractors)];
  const shuffled = shuffleArray(allOptions);
  const correctIndex = shuffled.indexOf(q.correctText);
  return { ...q, options: shuffled, answer: correctIndex };
}

// ========== QUIZ ==========
function startQuiz() {
  currentQ = 0;
  score = 0;
  answers = [];
  selectedOption = null;
  answered = false;

  // Flatten & shuffle all questions with randomized options
  shuffledQuestions = [];
  modules.forEach(m => {
    m.questions.forEach(q => {
      shuffledQuestions.push({ ...buildShuffledQuestion(q), module: m });
    });
  });

  showScreen('quizScreen');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = shuffledQuestions[currentQ];
  const m = q.module;
  const bgClass = `snail-bg-${q.id}`;
  selectedOption = null;
  answered = false;

  const progress = ((currentQ) / shuffledQuestions.length) * 100;

  document.getElementById('quizArea').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="progress-info">
      <span>第 ${currentQ + 1} / ${shuffledQuestions.length} 题</span>
      <span>得分: ${score}</span>
    </div>
    <div class="question-area ${bgClass}">
      <span class="module-badge ${m.badgeClass}">${m.icon} ${m.title}</span>
      <div class="question-card">
        <div class="contact-chip">
          <div class="contact-avatar" style="background:${q.contact.color}">${q.contact.initial}</div>
          <span class="contact-name">${q.contact.name} · ${q.contact.role}</span>
        </div>
        <div class="question-text">${q.text}</div>
        <div class="options-grid" id="optionsGrid">
          ${q.options.map((opt, i) => `
            <button class="option-btn" data-index="${i}" onclick="selectOption(${i})">${opt}</button>
          `).join('')}
        </div>
        <div class="explanation-card" id="explanationCard">
          <div class="label">解析</div>
          <div class="content">${q.explanation}</div>
          <span class="knowledge-tag">${q.knowledge}</span>
        </div>
      </div>
    </div>
    <div class="next-btn-wrap">
      <button class="btn-next" id="nextBtn" disabled onclick="nextQuestion()">
        ${currentQ < shuffledQuestions.length - 1 ? '下一题' : '查看结果'}
      </button>
    </div>
  `;
}

function selectOption(index) {
  if (answered) return;
  answered = true;
  selectedOption = index;

  const q = shuffledQuestions[currentQ];
  const isCorrect = index === q.answer;
  if (isCorrect) score++;

  answers.push({ questionId: q.id, selected: index, correct: q.answer, isCorrect });

  const btns = document.querySelectorAll('#optionsGrid .option-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.answer) btn.classList.add('correct');
    if (i === index && !isCorrect) btn.classList.add('wrong');
  });

  document.getElementById('explanationCard').classList.add('show');
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= shuffledQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  const total = shuffledQuestions.length;
  const pct = Math.round((score / total) * 100);
  const correct = score;
  const wrong = total - score;

  let grade = '';
  let emoji = '';
  if (pct >= 90) { grade = 'AI达人'; emoji = '🏆'; }
  else if (pct >= 70) { grade = 'AI进阶者'; emoji = '🌟'; }
  else if (pct >= 50) { grade = 'AI入门者'; emoji = '🌱'; }
  else { grade = 'AI新手'; emoji = '🥚'; }

  document.getElementById('resultCard').innerHTML = `
    <h2>${emoji} ${grade}</h2>
    <div class="result-score">${pct}%</div>
    <div class="result-detail">
      你答对了 ${correct} 道题，错误 ${wrong} 题<br>
      ${pct >= 70 ? '你的AI知识掌握得不错！继续深入学习可以成为AI达人。' : '继续学习AI，你也能达到顿悟的时刻！'}
    </div>
    <div class="result-stats">
      <div class="result-stat"><span class="num green">${correct}</span><span class="lbl">正确</span></div>
      <div class="result-stat"><span class="num red">${wrong}</span><span class="lbl">错误</span></div>
      <div class="result-stat"><span class="num" style="color:var(--accent-pink)">${total}</span><span class="lbl">总题</span></div>
    </div>
    <button class="btn-retry" onclick="startQuiz()">再来一次</button>
  `;

  showScreen('resultScreen');
}
</script>
</body>
</html>
